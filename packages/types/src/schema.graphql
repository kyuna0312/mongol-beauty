scalar DateTime
scalar Upload

enum OrderStatus {
  WAITING_PAYMENT
  CONFIRMED
  SHIPPING
  COMPLETED
  CANCELLED
}

enum SkinType {
  OILY
  DRY
  COMBINATION
  SENSITIVE
  NORMAL
}

enum Feature {
  ANTI_AGING
  HYDRATING
  BRIGHTENING
  ACNE_FIGHTING
  SUNSCREEN
  ORGANIC
}

type Category {
  id: ID!
  name: String!
  slug: String!
  description: String
  imageUrl: String
  products: [Product!]!
}

type Product {
  id: ID!
  name: String!
  category: Category!
  price: Int!
  stock: Int!
  description: String
  skinType: [SkinType!]!
  features: [Feature!]!
  images: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type OrderItem {
  id: ID!
  product: Product!
  quantity: Int!
  price: Int!
}

type Order {
  id: ID!
  items: [OrderItem!]!
  totalPrice: Int!
  status: OrderStatus!
  paymentReceiptUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
  user: User
}

type User {
  id: ID!
  phone: String
  name: String
  orders: [Order!]!
  createdAt: DateTime!
}

type Query {
  products(categoryId: ID, limit: Int, offset: Int): [Product!]!
  product(id: ID!): Product
  categories: [Category!]!
  category(id: ID!): Category
  order(id: ID!): Order
  orders: [Order!]!
  me: User
}

input CreateOrderItemInput {
  productId: ID!
  quantity: Int!
}

input CreateOrderInput {
  items: [CreateOrderItemInput!]!
  phone: String
  name: String
}

type Mutation {
  createOrder(input: CreateOrderInput!): Order!
  uploadPaymentReceipt(orderId: ID!, file: Upload!): Order!
  confirmPayment(orderId: ID!): Order! # Admin only
  updateOrderStatus(orderId: ID!, status: OrderStatus!): Order! # Admin only
}

# =============================================================================
# Mongol Beauty — Production Docker Compose (IP mode, no SSL)
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Web:     http://<SERVER_IP>
# API:     http://<SERVER_IP>:4000/graphql
# =============================================================================

name: mongol-beauty-prod

services:

  # ── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - mongol-beauty-prod-network

  # ── Backend services ─────────────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mb-order-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SERVICE_MODE: order
      PORT: 4010
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNCHRONIZE: "false"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    networks:
      - mongol-beauty-prod-network

  payment-service:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mb-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
    environment:
      NODE_ENV: production
      SERVICE_MODE: payment
      PORT: 4020
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNCHRONIZE: "false"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      ORDER_SERVICE_URL: http://order-service:4010
    volumes:
      - uploads_data:/app/uploads
    networks:
      - mongol-beauty-prod-network

  gateway:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mb-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
    environment:
      NODE_ENV: production
      SERVICE_MODE: gateway
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNCHRONIZE: "false"
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL}
      ORDER_SERVICE_URL: http://order-service:4010
      PAYMENT_SERVICE_URL: http://payment-service:4020
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mongol-beauty-prod-network

  # ── Frontend ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: http://${SERVER_IP}:4000/graphql
    container_name: mb-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - mongol-beauty-prod-network

  # ── Weekly DB backup ─────────────────────────────────────────────────────
  db-backup:
    image: postgres:15-alpine
    container_name: mb-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
    volumes:
      - ${BACKUP_DIR:-/home/backups/mongol-beauty}:/backups
      - ./scripts/db-backup.sh:/scripts/db-backup.sh:ro
    command: >
      sh -c "
        chmod +x /scripts/db-backup.sh &&
        echo '59 23 * * 6 /scripts/db-backup.sh >> /backups/backup.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    networks:
      - mongol-beauty-prod-network

volumes:
  postgres_data:
    name: mb_prod_postgres_data
  uploads_data:
    name: mb_prod_uploads_data

networks:
  mongol-beauty-prod-network:
    name: mongol-beauty-prod-network

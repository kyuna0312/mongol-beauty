# =============================================================================
# Mongol Beauty — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Web:  https://<DOMAIN>
# API:  https://<API_DOMAIN>/graphql
# =============================================================================

name: mongol-beauty-prod

# ── Reusable env anchors ──────────────────────────────────────────────────────
x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: ${DB_NAME}

x-api-build: &api-build
  build:
    context: .
    dockerfile: apps/api/Dockerfile

x-r2-env: &r2-env
  RECEIPT_STORAGE_DRIVER: ${RECEIPT_STORAGE_DRIVER:-r2}
  CF_R2_ACCOUNT_ID: ${CF_R2_ACCOUNT_ID}
  CF_R2_ACCESS_KEY_ID: ${CF_R2_ACCESS_KEY_ID}
  CF_R2_SECRET_ACCESS_KEY: ${CF_R2_SECRET_ACCESS_KEY}
  CF_R2_BUCKET: ${CF_R2_BUCKET}
  CF_R2_PUBLIC_URL: ${CF_R2_PUBLIC_URL}
  RECEIPT_MAX_BYTES: ${RECEIPT_MAX_BYTES:-5242880}

x-api-base-env: &api-base-env
  <<: *db-env
  NODE_ENV: production
  DB_SYNCHRONIZE: "false"
  FRONTEND_URL: ${FRONTEND_URL}
  JWT_SECRET: ${JWT_SECRET}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_SECRET}

services:

  # ── Reverse proxy + SSL ──────────────────────────────────────────────────
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: mb-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - mongol-beauty-prod-network

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: mb-acme
    restart: unless-stopped
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - nginx-proxy
    networks:
      - mongol-beauty-prod-network

  # ── Database ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - mongol-beauty-prod-network

  # ── DB migrations (runs once, exits) ─────────────────────────────────────
  migrator:
    <<: *api-build
    container_name: mb-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *db-env
      NODE_ENV: production
      DB_SYNCHRONIZE: "false"
    command: ["node", "node_modules/typeorm/cli.js", "migration:run", "-d", "apps/api/.dist/data-source.js"]
    networks:
      - mongol-beauty-prod-network

  # ── Backend services ─────────────────────────────────────────────────────
  order-service:
    <<: *api-build
    container_name: mb-order-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      <<: *api-base-env
      SERVICE_MODE: order
      PORT: 4010
    networks:
      - mongol-beauty-prod-network

  payment-service:
    <<: *api-build
    container_name: mb-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      order-service:
        condition: service_started
    environment:
      <<: [*api-base-env, *r2-env]
      SERVICE_MODE: payment
      PORT: 4020
      ORDER_SERVICE_URL: http://order-service:4010
    volumes:
      - uploads_data:/app/uploads
    networks:
      - mongol-beauty-prod-network

  gateway:
    <<: *api-build
    container_name: mb-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
    environment:
      <<: [*api-base-env, *r2-env]
      SERVICE_MODE: gateway
      PORT: 4000
      ORDER_SERVICE_URL: http://order-service:4010
      PAYMENT_SERVICE_URL: http://payment-service:4020
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mongol-beauty-prod-network

  # ── Frontend ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: https://${DOMAIN}/graphql
    container_name: mb-web
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      LETSENCRYPT_HOST: ${DOMAIN}
    depends_on:
      - nginx-proxy
      gateway:
        condition: service_healthy
    networks:
      - mongol-beauty-prod-network

  # ── Weekly DB backup ─────────────────────────────────────────────────────
  db-backup:
    image: postgres:15-alpine
    container_name: mb-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
    volumes:
      - ${BACKUP_DIR:-/home/backups/mongol-beauty}:/backups
      - ./scripts/db-backup.sh:/scripts/db-backup.sh:ro
    command: >
      sh -c "
        chmod +x /scripts/db-backup.sh &&
        echo '59 23 * * 6 /scripts/db-backup.sh >> /backups/backup.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    networks:
      - mongol-beauty-prod-network

volumes:
  postgres_data:
    name: mb_prod_postgres_data
  uploads_data:
    name: mb_prod_uploads_data
  certs:
    name: mb_prod_certs
  vhost:
    name: mb_prod_vhost
  html:
    name: mb_prod_html
  acme:
    name: mb_prod_acme

networks:
  mongol-beauty-prod-network:
    name: mongol-beauty-prod-network

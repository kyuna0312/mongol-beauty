# Mongol Beauty — local PostgreSQL only.
# Compose loads variables from a `.env` file in this directory (repo root) automatically.
#
# Start:  npm run docker:up   OR   yarn docker:up   OR   ./scripts/docker-compose.sh up -d
# Logs:   npm run docker:logs
# Reset:  npm run docker:clean   (removes the volume — deletes all local DB data)

name: mongol-beauty

services:
  postgres:
    image: postgres:15-alpine
    container_name: mongol-beauty-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mongol_beauty}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mongol_beauty}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mongol-beauty-network

volumes:
  postgres_data:
    name: mongol_beauty_postgres_data

networks:
  mongol-beauty-network:
    name: mongol-beauty-network

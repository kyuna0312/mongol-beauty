# Mongol Beauty — local PostgreSQL only.
# Compose loads variables from a `.env` file in this directory (repo root) automatically.
#
# Start:  npm run docker:up   OR   yarn docker:up   OR   ./scripts/docker-compose.sh up -d
# Logs:   npm run docker:logs
# Reset:  npm run docker:clean   (removes the volume — deletes all local DB data)

name: mongol-beauty

services:
  postgres:
    image: postgres:15-alpine
    container_name: mongol-beauty-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mongol_beauty}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mongol_beauty}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mongol-beauty-network

  gateway:
    image: node:20-alpine
    container_name: mongol-beauty-gateway
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_MODE: gateway
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-mongol_beauty}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ORDER_SERVICE_URL: http://order-service:4010
      PAYMENT_SERVICE_URL: http://payment-service:4020
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
    command: sh -c "yarn install --frozen-lockfile && yarn workspace @mongol-beauty/api start:dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mongol-beauty-network

  order-service:
    image: node:20-alpine
    container_name: mongol-beauty-order-service
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_MODE: order
      PORT: 4010
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-mongol_beauty}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
    ports:
      - "4010:4010"
    volumes:
      - ./:/app
    command: sh -c "yarn install --frozen-lockfile && yarn workspace @mongol-beauty/api start:dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mongol-beauty-network

  payment-service:
    image: node:20-alpine
    container_name: mongol-beauty-payment-service
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_MODE: payment
      PORT: 4020
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-mongol_beauty}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      ORDER_SERVICE_URL: http://order-service:4010
    ports:
      - "4020:4020"
    volumes:
      - ./:/app
    command: sh -c "yarn install --frozen-lockfile && yarn workspace @mongol-beauty/api start:dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4020/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mongol-beauty-network

volumes:
  postgres_data:
    name: mongol_beauty_postgres_data

networks:
  mongol-beauty-network:
    name: mongol-beauty-network

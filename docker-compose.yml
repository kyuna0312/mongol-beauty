# Mongol Beauty — local development (DB + API services with source mount + hot reload)
# Compose loads variables from `.env` in the repo root automatically.
#
# Start:  yarn docker:up   OR   npm run docker:up
# Logs:   yarn docker:logs
# Reset:  yarn docker:clean   (removes volumes — deletes all local DB data)
#
# node_modules are installed once into a named volume on first start.
# To force reinstall (e.g. after adding packages): yarn docker:clean && yarn docker:up

name: mongol-beauty

# ── Reusable env anchors ──────────────────────────────────────────────────────
x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_NAME: ${DB_NAME:-mongol_beauty}

x-api-base: &api-base
  image: node:20-alpine
  working_dir: /app
  restart: unless-stopped
  volumes:
    - ./:/app
    - nm_cache:/app/node_modules
  # Install deps only if node_modules is empty (cache miss), then start the service.
  # This avoids a full `yarn install` on every container restart.
  command: >
    sh -c "
      [ -d node_modules/.bin ] || yarn install --frozen-lockfile &&
      yarn workspace @mongol-beauty/api start:dev
    "

x-api-base-env: &api-base-env
  <<: *db-env
  NODE_ENV: ${NODE_ENV:-development}
  DB_SYNCHRONIZE: "true"
  JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
  INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-dev-internal-secret}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

services:
  postgres:
    image: postgres:15-alpine
    container_name: mongol-beauty-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mongol_beauty}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mongol_beauty}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mongol-beauty-network

  order-service:
    <<: *api-base
    container_name: mongol-beauty-order-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *api-base-env
      SERVICE_MODE: order
      PORT: 4010
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - mongol-beauty-network

  payment-service:
    <<: *api-base
    container_name: mongol-beauty-payment-service
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
    environment:
      <<: *api-base-env
      SERVICE_MODE: payment
      PORT: 4020
      ORDER_SERVICE_URL: http://order-service:4010
      RECEIPT_STORAGE_DRIVER: ${RECEIPT_STORAGE_DRIVER:-local}
    ports:
      - "4020:4020"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4020/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - mongol-beauty-network

  gateway:
    <<: *api-base
    container_name: mongol-beauty-gateway
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
    environment:
      <<: *api-base-env
      SERVICE_MODE: gateway
      PORT: 4000
      ORDER_SERVICE_URL: http://order-service:4010
      PAYMENT_SERVICE_URL: http://payment-service:4020
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - mongol-beauty-network

volumes:
  postgres_data:
    name: mongol_beauty_postgres_data
  nm_cache:
    name: mongol_beauty_nm_cache

networks:
  mongol-beauty-network:
    name: mongol-beauty-network
